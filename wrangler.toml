# ---------------------------------------------------------------------------
# Production — deploy: npx wrangler deploy --env production
# ---------------------------------------------------------------------------
[env.production]
name = "webui-xl"
vars = { ENVIRONMENT = "production" }

# Uncomment and set your hostname after adding the domain in Cloudflare dashboard:
# routes = [{ pattern = "webui.example.com", custom_domain = true }]

[[env.production.d1_databases]]
binding = "DB"
database_name = "webui-xl"
database_id = "538a01bd-b550-46d3-8db1-7c3bde73cda4"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "DATA"
bucket_name = "webui-xl-data"

