name = "webui-xll"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# --- DATABASE DI AREA GLOBAL (BIAR LANGSUNG KEBACA TANPA ENV) ---
[[d1_databases]]
binding = "DB"
database_name = "webui-xl-staging"
database_id = "538a01bd-b550-46d3-8db1-7c3bde73cda4"
migrations_dir = "migrations"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[assets]
directory = "./static"
binding = "ASSETS"

[vars]
ENVIRONMENT = "production"

[triggers]
crons = ["*/5 * * * *"]

[dev]
port = 8787

# ---------------------------------------------------------------------------
# Staging Environment
# ---------------------------------------------------------------------------
[env.staging]
name = "webui-xl-staging"

# ---------------------------------------------------------------------------
# Production Environment
# ---------------------------------------------------------------------------
[env.production]
name = "webui-xl"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webui-xl-staging"
database_id = "538a01bd-b550-46d3-8db1-7c3bde73cda4"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "DATA"
bucket_name = "webui-xl-staging-data"

# ---------------------------------------------------------------------------
# Production — deploy: npx wrangler deploy --env production
# ---------------------------------------------------------------------------
[env.production]
name = "webui-xl"
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "webui-xl"
database_id = "538a01bd-b550-46d3-8db1-7c3bde73cda4"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "DATA"
bucket_name = "webui-xl-data"

[[env.staging.r2_buckets]]
binding = "DATA"
bucket_name = "webui-xl-staging-data"

